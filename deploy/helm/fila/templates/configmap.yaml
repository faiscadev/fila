apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fila.fullname" . }}
  labels:
    {{- include "fila.labels" . | nindent 4 }}
data:
  fila.toml: |
    [server]
    listen_addr = "0.0.0.0:{{ .Values.service.port }}"

    [lua]
    default_timeout_ms = {{ .Values.lua.defaultTimeoutMs }}
    default_memory_limit_bytes = {{ .Values.lua.defaultMemoryLimitBytes }}
    circuit_breaker_threshold = {{ .Values.lua.circuitBreakerThreshold }}
    circuit_breaker_cooldown_ms = {{ .Values.lua.circuitBreakerCooldownMs }}

    {{- if .Values.tls.enabled }}
    [tls]
    cert_path = "/etc/fila/tls/tls.crt"
    key_path = "/etc/fila/tls/tls.key"
    {{- end }}

    {{- if .Values.auth.bootstrapApiKey }}
    [auth]
    bootstrap_apikey = "{{ .Values.auth.bootstrapApiKey }}"
    {{- end }}

    {{- if .Values.telemetry.enabled }}
    [telemetry]
    otlp_endpoint = "{{ .Values.telemetry.otlpEndpoint }}"
    {{- end }}

    {{- if .Values.cluster.enabled }}
    [cluster]
    node_id = FILA_NODE_ID
    bind_addr = "0.0.0.0:{{ .Values.cluster.port }}"
    replication_factor = {{ .Values.cluster.replicationFactor }}
    {{- end }}
