{{- if not .Values.cluster.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fila.fullname" . }}
  labels:
    {{- include "fila.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fila.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fila.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: fila
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/fila/fila.toml"]
          {{- if .Values.auth.bootstrapApiKey }}
          env:
            - name: FILA_BOOTSTRAP_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fila.fullname" . }}-auth
                  key: bootstrap-apikey
          {{- end }}
          ports:
            - name: fibp
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/fila
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/fila
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/fila/tls
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "fila.fullname" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "fila.fullname" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.certSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
