name: Bench Regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Force update baseline from current branch'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  BENCH_RUNS: 3
  REGRESSION_THRESHOLD: 10

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server, CLI, and bench tools in release
        run: cargo build --release -p fila-server -p fila-cli -p fila-bench --bins

      - name: Run benchmarks (3 runs for median)
        run: |
          for i in $(seq 1 $BENCH_RUNS); do
            echo "=== Benchmark run $i/$BENCH_RUNS ==="
            cargo bench -p fila-bench --bench system
            mv crates/fila-bench/bench-results.json "bench-run-$i.json"
          done

      - name: Aggregate results (median of runs)
        run: |
          ./target/release/bench-aggregate bench-aggregated.json \
            $(for i in $(seq 1 $BENCH_RUNS); do echo "bench-run-$i.json"; done)

      # On PRs: compare against baseline and fail on regression
      - name: Restore baseline from cache
        if: github.event_name == 'pull_request'
        id: baseline-cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: bench-baseline.json
          key: bench-baseline-dummy
          restore-keys: bench-baseline-

      - name: Compare against baseline
        if: github.event_name == 'pull_request'
        id: compare
        continue-on-error: true
        run: |
          if [ -f bench-baseline.json ]; then
            set -o pipefail
            ./target/release/bench-compare --markdown bench-baseline.json bench-aggregated.json $REGRESSION_THRESHOLD | tee bench-comparison.md
          else
            echo "No baseline found — this is expected for the first run."
            echo "Baselines are created when PRs merge to main."
            echo ""
            echo "Current results:"
            python3 -m json.tool bench-aggregated.json
          fi

      # On main push or workflow_dispatch: save as new baseline
      - name: Prepare baseline for save
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
        run: cp bench-aggregated.json bench-baseline.json

      - name: Save baseline to cache
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: bench-baseline.json
          key: bench-baseline-${{ github.sha }}

      # github-action-benchmark: store results (main) or compare with alert (PR)
      - name: Store latency benchmark results (main)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: bench-aggregated-gab-latency.json
          benchmark-data-dir-path: dev/bench/latency
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
          comment-on-alert: false

      - name: Store throughput benchmark results (main)
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1
        with:
          tool: 'customBiggerIsBetter'
          output-file-path: bench-aggregated-gab-throughput.json
          benchmark-data-dir-path: dev/bench/throughput
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          skip-fetch-gh-pages: true
          comment-on-alert: false

      - name: Compare latency benchmarks (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1
        with:
          tool: 'customSmallerIsBetter'
          output-file-path: bench-aggregated-gab-latency.json
          benchmark-data-dir-path: dev/bench/latency
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          comment-on-alert: true
          alert-threshold: '115%'
          fail-on-alert: false
          alert-comment-cc-users: '@faiscadev'

      - name: Compare throughput benchmarks (PR)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1
        with:
          tool: 'customBiggerIsBetter'
          output-file-path: bench-aggregated-gab-throughput.json
          benchmark-data-dir-path: dev/bench/throughput
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          comment-on-alert: true
          alert-threshold: '115%'
          fail-on-alert: false
          alert-comment-cc-users: '@faiscadev'

      - name: Display benchmark summary
        if: always() && hashFiles('bench-aggregated.json') != ''
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f bench-comparison.md ]; then
            echo "### vs main baseline" >> $GITHUB_STEP_SUMMARY
            cat bench-comparison.md >> $GITHUB_STEP_SUMMARY
          else
            jq -r '"**Commit:** `\(.commit)`  "' bench-aggregated.json >> $GITHUB_STEP_SUMMARY
            jq -r '"**Time:** \(.timestamp)"' bench-aggregated.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Benchmark | Value | Unit |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---:|---|" >> $GITHUB_STEP_SUMMARY
            jq -r '.benchmarks[] | "| \(.name) | \(.value | tostring) | \(.unit) |"' bench-aggregated.json >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench-aggregated.json
            bench-aggregated-gab-*.json
            bench-run-*.json
            bench-comparison.md
          retention-days: 30

  bench-comment:
    name: Update PR with Bench Results
    needs: bench
    if: always() && github.event_name == 'pull_request' && needs.bench.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bench-results-${{ github.sha }}
        continue-on-error: true
      - name: Update PR description with benchmark results
        if: hashFiles('bench-aggregated.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Build the benchmark results section
          {
            echo "<!-- bench-results-start -->"
            if [ -f bench-comparison.md ]; then
              echo "## Benchmark Results (vs main baseline)"
              echo ""
              cat bench-comparison.md
            else
              echo "## Benchmark Results (median of 3 runs, no baseline yet)"
              echo ""
              jq -r '"**Commit:** `\(.commit)`  "' bench-aggregated.json
              jq -r '"**Time:** \(.timestamp)"' bench-aggregated.json
              echo ""
              echo "| Benchmark | Value | Unit |"
              echo "|---|---:|---|"
              jq -r '.benchmarks[] | "| \(.name) | \(.value | tostring) | \(.unit) |"' bench-aggregated.json
            fi
            echo "<!-- bench-results-end -->"
          } > /tmp/bench-section.md

          # Get the current PR body
          current_body="$(gh pr view "$PR_NUMBER" --json body --jq '.body')"

          if echo "$current_body" | grep -qx '<!-- bench-results-start -->'; then
            # Replace existing bench results section
            echo "$current_body" | perl -0777 -pe \
              'BEGIN { local $/; open F, "/tmp/bench-section.md"; $r = <F>; chomp $r; close F }
               s/<!-- bench-results-start -->.*?<!-- bench-results-end -->/$r/s' \
              > /tmp/new-body.md
          else
            # Append bench results section to the end
            {
              echo "$current_body"
              echo ""
              cat /tmp/bench-section.md
            } > /tmp/new-body.md
          fi

          gh pr edit "$PR_NUMBER" --body-file /tmp/new-body.md

  update-docs:
    name: Update Benchmark Docs
    needs: bench
    if: github.event_name == 'push' && needs.bench.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bench-results-${{ github.sha }}

      - name: Build bench-update-docs
        run: cargo build --release -p fila-bench --bin bench-update-docs

      - name: Update docs/benchmarks.md
        run: |
          ./target/release/bench-update-docs \
            --self-bench bench-aggregated.json \
            --competitive-dir bench/competitive/results \
            --doc docs/benchmarks.md

      - name: Commit updated docs if changed
        run: |
          git diff --quiet docs/benchmarks.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks.md
          git commit -m "docs: update benchmarks.md from CI run [skip ci]"
          git push
