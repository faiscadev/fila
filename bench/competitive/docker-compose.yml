# Competitive benchmark broker configurations.
# Each broker uses production-recommended settings (not defaults).
#
# Usage:
#   docker compose up -d kafka rabbitmq nats    # start all
#   docker compose up -d kafka                  # start one
#   docker compose down -v                      # teardown + volumes

services:
  # Kafka in KRaft mode (no ZooKeeper) — production-recommended since Kafka 3.3+
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (combined controller + broker)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Production tuning
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 5s
      timeout: 10s
      retries: 10

  # RabbitMQ with quorum queues (production-recommended since RabbitMQ 3.8+)
  # Uses entrypoint override to fix .erlang.cookie permissions on Docker Desktop for Mac
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bench
      RABBITMQ_DEFAULT_PASS: bench
    entrypoint:
      - bash
      - -c
      - |
        echo 'benchcookie' > /var/lib/rabbitmq/.erlang.cookie
        chmod 600 /var/lib/rabbitmq/.erlang.cookie
        chown rabbitmq:rabbitmq /var/lib/rabbitmq/.erlang.cookie
        exec docker-entrypoint.sh rabbitmq-server
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  # Fila — built from the project Dockerfile so all brokers run in Docker
  # with identical containerisation overhead for a fair comparison.
  fila:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    volumes:
      - ./fila.toml:/etc/fila/fila.toml:ro
    working_dir: /etc/fila
    environment:
      FILA_DATA_DIR: /data
    healthcheck:
      test: ["CMD-SHELL", "fila --addr http://localhost:5555 queue list > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  # NATS with JetStream enabled (production-recommended for persistent messaging)
  nats:
    image: nats:2.11
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
